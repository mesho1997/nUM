    <style>

        .pro-badge {

            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1px;

        .floating-ai {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border-radius: 60px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid var(--accent);
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .floating-ai:hover {
            transform: scale(1.05);
        }
        
        .ai-indicator {
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {

        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 50px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .chart-container {
            height: 300px;
            margin: 20px 0;
        }
        
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;

        }
        
        .stat-item {
            background: var(--bg-primary);

        .smart-suggestions {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        class XISORAProAI {
            constructor() {

            analyzeNumbers(numbers) {
                const analysis = {
                    total: numbers.length,
                    unique: new Set(numbers).size,
                    byCountry: this.groupByCountry(numbers),
                    patterns: this.detectPatterns(numbers),
                    anomalies: this.detectAnomalies(numbers),

                    analysis.suggestions.push('?? ????? ?? ??? ??? - ???? ??????? ??? ??????');
                }

                return analysis;
            }

            groupByCountry(numbers) {
                const countries = new Map();
                numbers.forEach(num => {
                    const code = num.substring(0, 3);
                    countries.set(code, (countries.get(code) || 0) + 1);
                });
                return countries;
            }

            detectPatterns(numbers) {
                const patterns = [];
                numbers.forEach(num => {
                    // ??? ??????? ?????????
                    if (this.isSequential(num)) {
                        patterns.push({num, pattern: '??????'});
                    }
                    // ??? ??????? ????????
                    if (this.isRepeating(num)) {
                        patterns.push({num, pattern: '????'});
                    }
                });
                return patterns;
            }

            isSequential(num) {
                for(let i = 0; i < num.length - 1; i++) {
                    if (Math.abs(parseInt(num[i+1]) - parseInt(num[i])) !== 1) {
                        return false;
                    }
                }
                return true;
            }

            isRepeating(num) {
                const first = num[0];
                return num.split('').every(d => d === first);
            }

            detectAnomalies(numbers) {
                // ??? ??????? ???????? (??? 000000, 123456)
                const anomalies = [];
                numbers.forEach(num => {
                    if (this.isRepeating(num) && num.length > 5) {
                        anomalies.push({num, reason: '??? ???? ?????'});
                    }
                    if (this.isSequential(num) && num.length > 7) {

            }
        }

        // ????? ?????? ?????????
        const xisoraAI = new XISORAProAI();

        // ???? ??????? ?????? ???????
        class XISORAStorage {
            constructor() {
                this.storageKey = 'XISORA_PRO_DATA';
            }

            saveState(state) {
                localStorage.setItem(this.storageKey, JSON.stringify({
                    ...state,
                    timestamp: new Date().toISOString()
                }));
            }

            loadState() {
                return JSON.parse(localStorage.getItem(this.storageKey)) || null;
            }

            saveFavoriteList(name, numbers) {
                const favorites = this.getFavorites() || {};
                favorites[name] = {
                    numbers,
                    date: new Date().toISOString()
                };
                localStorage.setItem('XISORA_FAVORITES', JSON.stringify(favorites));
            }

            getFavorites() {
                return JSON.parse(localStorage.getItem('XISORA_FAVORITES')) || {};
            }
        }

        const storage = new XISORAStorage();

        // ???? ????????? ??????
        class XISORANotifications {
            static async notify(title, message, type = 'info') {
                if (Notification.permission === 'granted') {
                    new Notification(title, {
                        body: message,
                        icon: '/icon.png',
                        badge: '/badge.png'
                    });
                } else if (Notification.permission !== 'denied') {
                    await Notification.requestPermission();
                }
            }

            static showToast(message, duration = 3000) {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    background: #1e3a6b;
                    color: white;
                    padding: 15px 30px;
                    border-radius: 50px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                    z-index: 9999;
                    animation: slideIn 0.3s;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, duration);
            }
        }
