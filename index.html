<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة SMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        #loginBtn {
            background: #28a745;
            color: white;
        }
        
        #loginBtn:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        #dashboardBtn {
            background: #007bff;
            color: white;
        }
        
        #dashboardBtn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        #showNumbersBtn {
            background: #17a2b8;
            color: white;
        }
        
        #showNumbersBtn:hover {
            background: #117a8b;
            transform: translateY(-2px);
        }
        
        /* نافذة الكابتشا */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .modal h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .captcha-container {
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .captcha-image {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        
        .loading {
            color: #007bff;
            margin: 20px 0;
        }
        
        .error-message {
            color: #dc3545;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .captcha-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #007bff;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            direction: ltr;
        }
        
        .captcha-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .captcha-buttons button {
            flex: 1;
            padding: 10px;
        }
        
        #confirmCaptcha {
            background: #28a745;
            color: white;
        }
        
        #cancelCaptcha {
            background: #6c757d;
            color: white;
        }
        
        #refreshCaptcha {
            background: #ffc107;
            color: #333;
        }
        
        .status {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        #numbersDisplay {
            margin-top: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #007bff;
            color: white;
            padding: 10px;
        }
        
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 نظام إدارة SMS</h1>
        
        <div id="status" class="status info">جاهز للعمل</div>
        
        <div class="actions">
            <button id="loginBtn">🔑 تسجيل الدخول</button>
            <button id="dashboardBtn">📊 لوحة التحكم</button>
            <button id="showNumbersBtn">📞 أرقامي</button>
        </div>
        
        <iframe id="contentFrame" src="about:blank" style="display: none;"></iframe>
        
        <div id="numbersDisplay"></div>
    </div>
    
    <!-- نافذة الكابتشا -->
    <div class="modal" id="captchaModal">
        <div class="modal-content">
            <h3>🔐 أدخل رمز الكابتشا</h3>
            
            <div class="captcha-container" id="captchaContainer">
                <div class="loading">جاري تحميل الصورة...</div>
            </div>
            
            <div class="error-message" id="captchaError"></div>
            
            <input type="text" id="captchaInput" class="captcha-input" placeholder="أدخل الرقم" maxlength="2" disabled>
            
            <div class="captcha-buttons">
                <button id="refreshCaptcha">🔄 تحديث</button>
                <button id="confirmCaptcha" disabled>✔ تأكيد</button>
                <button id="cancelCaptcha">✖ إلغاء</button>
            </div>
        </div>
    </div>
    
    <script>
        const BASE_URL = 'http://54.39.104.241/ints';
        const PHPSESSID = '6600b87d11351991b8b754ae9dfd0a70';
        
        // مسارات متعددة للكابتشا
        const CAPTCHA_PATHS = [
            '/captcha.php',
            '/captcha',
            '/securimage/securimage_show.php',
            '/captcha/image',
            '/simple-php-captcha.php',
            '/captcha/generate',
            '/captcha.jpg',
            '/captcha.png'
        ];
        
        let currentCaptchaUrl = '';
        
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
            console.log(`[${type}] ${message}`);
        }
        
        function updateIframe(url) {
            const iframe = document.getElementById('contentFrame');
            iframe.style.display = 'block';
            iframe.src = url;
        }
        
        // محاولة تحميل الكابتشا من مسارات متعددة
        async function tryLoadCaptcha() {
            const container = document.getElementById('captchaContainer');
            const errorDiv = document.getElementById('captchaError');
            const input = document.getElementById('captchaInput');
            const confirmBtn = document.getElementById('confirmCaptcha');
            
            errorDiv.textContent = '';
            
            // تجربة كل مسار
            for (const path of CAPTCHA_PATHS) {
                const url = `${BASE_URL}${path}?t=${Date.now()}`;
                container.innerHTML = `<div class="loading">جاري تجربة: ${path}</div>`;
                
                try {
                    // محاولة تحميل الصورة
                    const response = await fetch(url, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Cookie': `PHPSESSID=${PHPSESSID}`
                        }
                    });
                    
                    if (response.ok) {
                        const blob = await response.blob();
                        if (blob.type.startsWith('image/')) {
                            const imageUrl = URL.createObjectURL(blob);
                            container.innerHTML = `<img src="${imageUrl}" class="captcha-image" alt="كابتشا">`;
                            input.disabled = false;
                            confirmBtn.disabled = false;
                            currentCaptchaUrl = url;
                            showStatus(`✅ تم تحميل الكابتشا من: ${path}`, 'success');
                            return true;
                        }
                    }
                } catch (e) {
                    console.log(`فشل المسار ${path}:`, e.message);
                }
            }
            
            // إذا فشلت كل المحاولات
            container.innerHTML = `
                <div style="text-align: center; color: #dc3545;">
                    ❌ فشل تحميل الكابتشا<br>
                    <small>حاول النقر على "تحديث"</small>
                </div>
            `;
            errorDiv.textContent = 'لم نتمكن من تحميل صورة الكابتشا. تأكد من اتصالك بالإنترنت.';
            return false;
        }
        
        // عرض نافذة الكابتشا
        async function showCaptchaModal() {
            const modal = document.getElementById('captchaModal');
            const input = document.getElementById('captchaInput');
            const confirmBtn = document.getElementById('confirmCaptcha');
            const refreshBtn = document.getElementById('refreshCaptcha');
            const cancelBtn = document.getElementById('cancelCaptcha');
            
            modal.style.display = 'flex';
            input.value = '';
            input.disabled = true;
            confirmBtn.disabled = true;
            
            // محاولة تحميل الكابتشا
            await tryLoadCaptcha();
            
            return new Promise((resolve, reject) => {
                const onConfirm = () => {
                    const value = input.value.trim();
                    if (value) {
                        cleanup();
                        modal.style.display = 'none';
                        resolve(value);
                    }
                };
                
                const onRefresh = async () => {
                    await tryLoadCaptcha();
                };
                
                const onCancel = () => {
                    cleanup();
                    modal.style.display = 'none';
                    reject(new Error('تم الإلغاء'));
                };
                
                const cleanup = () => {
                    confirmBtn.removeEventListener('click', onConfirm);
                    refreshBtn.removeEventListener('click', onRefresh);
                    cancelBtn.removeEventListener('click', onCancel);
                };
                
                confirmBtn.addEventListener('click', onConfirm);
                refreshBtn.addEventListener('click', onRefresh);
                cancelBtn.addEventListener('click', onCancel);
                
                // الضغط على Enter
                input.onkeypress = (e) => {
                    if (e.key === 'Enter' && !confirmBtn.disabled) {
                        onConfirm();
                    }
                };
            });
        }
        
        // تسجيل الدخول
        async function loginWithCaptcha() {
            try {
                showStatus('جاري تجهيز الكابتشا...', 'info');
                const captchaValue = await showCaptchaModal();
                
                showStatus(`جاري تسجيل الدخول...`, 'info');
                
                const formData = new URLSearchParams({
                    username: '1Lmohamedabed',
                    password: '1Lmohamedabed',
                    capt: captchaValue
                });
                
                const response = await fetch(`${BASE_URL}/signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Cookie': `PHPSESSID=${PHPSESSID}`,
                        'User-Agent': 'Mozilla/5.0'
                    },
                    body: formData,
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showStatus('✅ تم تسجيل الدخول بنجاح!', 'success');
                    updateIframe(`${BASE_URL}/client/`);
                } else {
                    showStatus(`❌ فشل تسجيل الدخول: ${response.status}`, 'error');
                }
            } catch (error) {
                if (error.message !== 'تم الإلغاء') {
                    showStatus(`❌ خطأ: ${error.message}`, 'error');
                }
            }
        }
        
        // جلب الأرقام
        function fetchNumbers() {
            showStatus('جاري تحميل الأرقام...', 'info');
            
            const display = document.getElementById('numbersDisplay');
            display.innerHTML = '<div class="loading">جاري التحميل...</div>';
            
            const script = document.createElement('script');
            script.src = `${BASE_URL}/client/res/data_smsnumbers.php?callback=handleNumbers&_=${Date.now()}`;
            
            window.handleNumbers = function(data) {
                if (data && data.aaData) {
                    let html = '<table><tr><th>المعرف</th><th>الرقم</th><th>الحالة</th></tr>';
                    data.aaData.forEach(row => {
                        html += '<tr>';
                        row.forEach(cell => html += `<td>${cell || '-'}</td>`);
                        html += '</tr>';
                    });
                    html += '</table>';
                    display.innerHTML = html;
                    showStatus(`✅ تم تحميل ${data.aaData.length} رقم`, 'success');
                } else {
                    display.innerHTML = '<div class="status info">لا توجد أرقام</div>';
                }
                delete window.handleNumbers;
            };
            
            document.body.appendChild(script);
        }
        
        // الأحداث
        document.getElementById('loginBtn').onclick = loginWithCaptcha;
        document.getElementById('dashboardBtn').onclick = () => updateIframe(`${BASE_URL}/client/SMSDashboard`);
        document.getElementById('showNumbersBtn').onclick = fetchNumbers;
        
        // إغلاق النافذة بالضغط خارجها
        window.onclick = (e) => {
            const modal = document.getElementById('captchaModal');
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
